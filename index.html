<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfigurator Nastawnika DCC</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1, h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #f9f9f9;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .summary-box {
            background-color: #eef2f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .summary-row.bold {
            font-weight: bold;
            border-top: 1px solid #d1d9e0;
            padding-top: 8px;
            margin-top: 8px;
        }

        .total-price-box {
            text-align: center;
            background-color: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .total-price-box p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .total-price-box h3 {
            margin: 10px 0 0 0;
            font-size: 2.5rem;
        }

        .details-list {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
        }
        
        .details-list table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .details-list th, .details-list td {
            text-align: left;
            padding: 4px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Opcje Nastawnika</h1>
        
        <form id="configForm">
            <div class="form-group">
                <label for="keyboard">Klawiatura</label>
                <select id="keyboard">
                    <option value="none">Brak</option>
                    <option value="small">Mała (4x3)</option>
                    <option value="large">Duża</option>
                </select>
            </div>

            <div class="form-group">
                <label for="screen">Wyświetlacz (OLED 0.96")</label>
                <select id="screen">
                    <option value="none">Brak</option>
                    <option value="1">1 szt.</option>
                </select>
            </div>

            <div class="form-group">
                <label for="power">Zasilanie (Moduł ładowania + Ogniwa)</label>
                <select id="power">
                    <option value="none">Brak (zasilanie po kablu)</option>
                    <option value="1">1 Akumulator 18650</option>
                    <option value="2">2 Akumulatory 18650</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lanyard">Smyczka</label>
                <select id="lanyard">
                    <option value="none">Brak</option>
                    <option value="1">1 szt.</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cable">Przewód ładujący (USB-C)</label>
                <select id="cable">
                    <option value="none">Brak</option>
                    <option value="1">1 szt.</option>
                </select>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Koszty</h2>
        
        <div class="summary-box">
            <div class="summary-row">
                <span>Koszty stałe (obudowa, śruby):</span>
                <span id="displayFixedCost">0.00 zł</span>
            </div>
            <div class="summary-row">
                <span>Koszty komponentów opcjonalnych:</span>
                <span id="displayDynamicCost">0.00 zł</span>
            </div>
            <div class="summary-row bold">
                <span>Suma szacunkowa:</span>
                <span id="displayTotalCostSmall">0.00 zł</span>
            </div>
        </div>

        <div class="total-price-box">
            <p>Całkowity koszt budowy</p>
            <h3 id="displayTotalCostBig">0.00 zł</h3>
        </div>

        <div class="details-list">
            <strong>Szczegółowy wykaz (Generowany dynamicznie):</strong>
            <table id="detailsTable">
                </table>
        </div>
    </div>
</div>

<script src="ceny.js"></script>

<script>
    // ==========================================
    // LOGIKA APLIKACJI 
    // ==========================================

    const formElements = document.querySelectorAll('select');
    const tableEl = document.getElementById('detailsTable');

    function updatePricing() {
        let fixedCostTotal = 0;
        let dynamicCostTotal = 0;
        let detailsHTML = `<tr><th>Komponent</th><th>Cena jd.</th><th>Ilość</th><th>Suma</th></tr>`;

        function addRow(name, unitPrice, qty) {
            const sum = unitPrice * qty;
            detailsHTML += `<tr>
                <td>${name}</td>
                <td>${unitPrice.toFixed(2)} zł</td>
                <td>${qty}</td>
                <td><b>${sum.toFixed(2)} zł</b></td>
            </tr>`;
            return sum;
        }

        // 1. Wyliczanie kosztów absolutnie stałych
        for (const [name, data] of Object.entries(PRICING.fixedItems)) {
            fixedCostTotal += addRow(name, data[0], data[1]);
        }

        // 2. Wyliczanie kosztów dynamicznych (Zależnych od formularza)
        const keyboardVal = document.getElementById('keyboard').value;
        const screenVal = document.getElementById('screen').value;
        const powerVal = document.getElementById('power').value;
        const lanyardVal = document.getElementById('lanyard').value;
        const cableVal = document.getElementById('cable').value;

        // A. Sterownik ESP32 oraz powiązana z nim ROBOCIZNA
        if (keyboardVal === 'none') {
            dynamicCostTotal += addRow("Sterownik ESP32 S2 Mini", PRICING.options.esp32_base, 1);
            dynamicCostTotal += addRow("Robocizna (Montaż bazowy)", PRICING.options.labor_base, 1);
        } else {
            dynamicCostTotal += addRow("Sterownik ESP32 S2 Mini (Wersja z klaw.)", PRICING.options.esp32_with_keyboard, 1);
            dynamicCostTotal += addRow("Robocizna (Montaż rozszerzony)", PRICING.options.labor_keyboard, 1);
            
            // Doliczenie samej klawiatury
            if (keyboardVal === 'small') {
                dynamicCostTotal += addRow("Klawiatura Mała 4x3", PRICING.options.keyboard_small, 1);
            } else if (keyboardVal === 'large') {
                dynamicCostTotal += addRow("Klawiatura Duża", PRICING.options.keyboard_large, 1);
            }
        }

        // B. Wyświetlacz
        if (screenVal === '1') {
            dynamicCostTotal += addRow("Wyświetlacz OLED 0.96 cala", PRICING.options.screen_oled, 1);
        }

        // C. Zasilanie
        if (powerVal === '1') {
            dynamicCostTotal += addRow("Układ ładowania (FM5324HJ1)", PRICING.options.charging_module, 1);
            dynamicCostTotal += addRow("Akumulator 18650", PRICING.options.battery_cell, 1);
            dynamicCostTotal += addRow("Koszyk baterii", PRICING.options.battery_holder, 1);
        } else if (powerVal === '2') {
            dynamicCostTotal += addRow("Układ ładowania (FM5324HJ1)", PRICING.options.charging_module, 1);
            dynamicCostTotal += addRow("Akumulator 18650", PRICING.options.battery_cell, 2);
            dynamicCostTotal += addRow("Koszyk baterii", PRICING.options.battery_holder, 2);
        }

        // D. Smyczka
        if (lanyardVal === '1') {
            dynamicCostTotal += addRow("Smyczka", PRICING.options.lanyard, 1);
        }

        // E. Przewód
        if (cableVal === '1') {
            dynamicCostTotal += addRow("Kabel do ładowania USB-C", PRICING.options.cable_usbc, 1);
        }

        // 3. Aktualizacja interfejsu
        const grandTotal = fixedCostTotal + dynamicCostTotal;

        document.getElementById('displayFixedCost').innerText = fixedCostTotal.toFixed(2) + ' zł';
        document.getElementById('displayDynamicCost').innerText = dynamicCostTotal.toFixed(2) + ' zł';
        document.getElementById('displayTotalCostSmall').innerText = grandTotal.toFixed(2) + ' zł';
        document.getElementById('displayTotalCostBig').innerText = grandTotal.toFixed(2) + ' zł';
        
        tableEl.innerHTML = detailsHTML;
    }

    // Nasłuchiwanie zmian w formularzu
    formElements.forEach(el => {
        el.addEventListener('change', updatePricing);
    });

    // Inicjalne przeliczenie przy załadowaniu strony
    updatePricing();

</script>
</body>
</html>
